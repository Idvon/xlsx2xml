name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install pyopenxlsx pyinstaller

      - name: Build GUI exe
        run: pyinstaller --onefile --windowed --name xlsx2xml --paths . --hidden-import xml_convert --hidden-import headers --hidden-import items --hidden-import post_headers gui.py

      - name: Build CLI exe
        run: pyinstaller --onefile --name xlsx2xml_cli --paths . --hidden-import xml_convert --hidden-import headers --hidden-import items --hidden-import post_headers generate_xml.py

      - name: Verify artifacts exist
        run: dir dist\

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/xlsx2xml.exe
            dist/xlsx2xml_cli.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
